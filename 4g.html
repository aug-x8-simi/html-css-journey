<style>
   .subscribe-button{
      background-color:rgb(204, 0, 0);
      color:white;
      border:none;
      padding: 10px 16px;
      border-radius: 2px;
      cursor:pointer;
      margin-right:  8px;
      transition: opacity 0.15s;
   }
   .subscribe-button:hover{
     opacity: 0.8;

   }
   .subscribe-button:active{
      opacity: 0.5;
   }
   .join-button{
      background-color: white;
      border-color:rgb(6, 95, 212);
      border-style: solid;
      border-width: 1px;
      color:rgb(6, 95, 212);
      padding: 9px 16px;
      border-radius: 2px;
      cursor: pointer;
      transition: background-color 1s;
      color: 0.15s;
   } 

   .join-button:hover{
      background-color:rgb(41, 118, 211); 
      color: white;
   }
   .join-button:active{
     opacity: 0.7;
   }
   .tweet-button{
     background-color: rgb(29, 155, 240);
     color:white;
     border:none;
     padding: 9px 15px;
     border-radius: 18px;
     font-size: 15px;
     font-weight: bold;
     cursor: pointer;
     margin-left: 8px;
     
   }
   .tweet-button:hover{
      box-shadow: 0px 5px 10px rgba(0 ,0 ,0, 0.15);
   }
</style>

<button class="subscribe-button">
    SUBSCRIBE
</button>
<button class="join-button">
    JOIN
</button>
<button class="tweet-button">
    Tweet
</button>
