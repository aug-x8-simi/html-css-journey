<!DOCTYPE html>
<html>
    <head>
        <style>
            .apply-button{
                background-color: rgb(10, 102, 194);
                color: white;
                padding: 12px 23px;
                border-style: none ;
                border-radius: 25px;
                font-size: 18px;
                cursor: pointer;
            }
            .apply-button:hover{
                background-color:rgb(14, 83, 152); ;
            }
            .save-button{
                background-color: white;
                color: rgb(63, 63, 189);
                padding: 9px 20px;
                border-color: blue;
                border-radius: 25px;
                font-size: 20px;
                margin-left: 8px;
                border-style: solid;
                cursor: pointer;
                font-weight: bold;
            }
            .save-button:hover{
                border-width: 3px;
                background-color: rgb(214, 226, 251);
                
                
            }
        </style>
    </head>
    <body>
        <button class="apply-button">Apply on company website</button>
        <button class="save-button">Save</button>
    </body>
</html>
