<!DOCTYPE html>
<html>
    
    <head>
        <style>
            p{
                font-family: Arial;
                margin: 0;
            }
            .p-1{
                font-size: 40px;
                margin-bottom: 8px;
                margin-top: 10px;
            }
            .p-2{
                color: rgb(70, 134, 70);
                font-size: 20px;
                margin-top: 8px;
                margin-bottom: 10px;
            }
            .p-3{
                font-size:20px ;
                margin-top: 10px;
            }
            .span-1{
                color: rgb(92, 90, 90);
                font-size: 19px;
            
            }
            .span-2{
                color: rgb(180, 86, 86);
            }
        </style>
    </head>

    <body>
        <p class="p-1">
            1,049.61 <span class="span-1">USD</span> 
        </p>

        <p class="p-2">
            +18.05 (1.75%) today
        </p>

        <p class="p-3"> 
            After hours 1,048.00 <span class="span-2">-1.61(0.15%)</span>
        </p>
    </body>

</html>
